name: Build Android APK

# Wraps the Tend web app as a native Android app with Capacitor and builds an
# installable debug APK. Run it from the Actions tab → "Build Android APK" →
# "Run workflow", then download the "tend-android-apk" artifact and install it
# on a phone (you'll need to allow "install from unknown sources").
#
# AUTO-UPDATING: capacitor.config.json points the WebView at the live site
# (server.url = https://tend-care-demo.vercel.app). That means you build and
# install this APK ONCE; from then on it always loads whatever is deployed to
# production, so web/UI/logic changes appear in the app with no rebuild or
# reinstall. Re-run this workflow only when something NATIVE changes (app icon,
# name, the server URL, or an added Capacitor plugin). The bundled dist/ stays
# in the APK as an offline fallback.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web dependencies
        run: npm install

      - name: Build the web app
        run: npm run build

      - name: Add Capacitor + Android platform
        run: |
          npm install -D @capacitor/core @capacitor/cli @capacitor/android
          # Generate the native Android project from capacitor.config.json and
          # copy the built web app (dist) into it.
          npx cap add android
          npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          # Capacitor's Android library targets Java 21; building with 17 fails
          # with "invalid source release: 21" at compileDebugJavaWithJavac.
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          # --init-script drops the duplicate legacy kotlin-stdlib-jdk7/jdk8 jars
          # (see ../android-kotlin-fix.gradle) so checkDebugDuplicateClasses passes.
          ./gradlew assembleDebug --no-daemon --init-script ../android-kotlin-fix.gradle

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tend-android-apk
          path: web/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
