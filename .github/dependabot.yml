# Dependabot: weekly dependency + GitHub Actions update PRs.
# Keeps the web app's npm packages and our workflow actions patched, and surfaces
# security advisories as PRs.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Bundle minor/patch bumps so we get one PR instead of many.
      npm-minor-patch:
        update-types: ["minor", "patch"]
    # Don't auto-propose MAJOR npm upgrades — they (vite 8, react 19,
    # @vitejs/plugin-react 6, etc.) break the build and spawn failed preview
    # deploys. Majors should be done deliberately. Security patches (patch/minor)
    # still come through.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
